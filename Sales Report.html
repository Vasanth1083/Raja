<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vimag - Sales Report</title>
    <style>
        body { font-family: 'Times New Roman', serif; padding: 30px; background-color: #fff; font-size: 10px; }
        
        .master-header-box {
            border: 3px solid #27ae60;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .back-btn { 
            position: absolute; left: 15px; top: 15px; padding: 12px 25px; 
            background: #2c3e50; color: white; border: none; cursor: pointer; 
            border-radius: 6px; font-weight: bold; font-size: 16px; 
            text-decoration: none; font-family: 'Times New Roman';
        }
        .back-btn:hover { background: #34495e; }

        .vimag-title { color: GREEN; font-size: 4.2em; font-weight: bold; margin: 5px 0; }
        #custHeader { font-size: 4em; color: red; margin: 10px 0; font-weight: bold; }
        .report-label { font-size: 2.3em; color: blue; text-transform: uppercase; letter-spacing: 1px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; border: 2.5px solid #27ae60; }
        th { background-color:yellow; color: black; padding: 15px; text-transform: uppercase; font-size: 17px; border: 1px solid #27ae60; }
        td { border: 1px solid #27ae60; padding: 14px; text-align: center; font-size: 18px; color: #000; }
        
        .total-value-text { color: #2980b9; font-weight: bold; } 
        .achieved-text { color: #27ae60; font-weight: bold; }    
        .balance-text { color: #e74c3c; font-weight: bold; }     
        
        .grand-total-row { background: #27ae60 !important; color: white; font-weight: bold; font-size: 1.2em; }
        
        .print-btn { 
            position: absolute; right: 15px; top: 15px; padding: 12px 25px; 
            background: red; color: white; border: none; cursor: pointer; 
            border-radius: 6px; font-weight: bold; font-size: 16px;
        }

        @media print { .print-btn, .back-btn { display: none; } .master-header-box { border: 3px solid red !important; } }
    </style>
</head>
<body>

<div class="master-header-box">
    <a href="index.html?view=master" class="back-btn">⬅ BACK</a>
    <button class="print-btn" onclick="window.print()">PRINT PDF</button>
    <img src="Logo.jpeg" width="130"><br>
    <div class="vimag-title">VIMAG TN REGION</div>
    <div id="custHeader">Customer Name</div>
    <div class="report-label">Sales Performance Report</div>
</div>

<table>
    <thead>
        <tr>
            <th>S.No</th>
            <th>Brand Name</th>
            <th>Article No</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Qty/Mo</th>
            <th id="dynamicMonthCol">Month Qty</th>
            <th>Total Value</th>
            <th>Achieved Value</th>
            <th>Balance</th>
            <th>Handled By</th>
            <th>Remarks</th>
        </tr>
    </thead>
    <tbody id="reportContent"></tbody>
    <tfoot>
        <tr class="grand-total-row">
            <td colspan="7" style="text-align: right; border: 1px solid white;">GRAND TOTAL:</td>
            <td id="grandTotalValue" style="border: 1px solid white;">0.00</td>
            <td id="grandAchievedValue" style="border: 1px solid white;">0.00</td>
            <td id="grandBalance" style="border: 1px solid white;">0.00</td>
            <td colspan="2" style="border: 1px solid white;"></td>
        </tr>
    </tfoot>
</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.6.10/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.6.10/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBC9Ny5zLH2TBQK9r469OXAMeQ6AbiScn8",
    databaseURL: "https://vimag-database-default-rtdb.firebaseio.com",
    projectId: "vimag-database",
    appId: "1:9582238917:web:1f0af85f45123de2e4a4ac"
};
// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const G_SHEET_URL = "https://script.google.com/macros/s/AKfycbxt9YfMYA8PKNlC0Vb_DIDVRsMWZnCUPMRGsCoQSnLDXWYorh57KU0NRFzrAmsY8ySRXA/exec?apiKey=VIMAG";

// 1. URL மற்றும் பிராண்ட் லிஸ்ட்
const brands = ["Rhodius", "Laco", "Lessmann", "Capital Weld Cleaners", "Dedeco", "Einhell", "Peddinghaus", "Rexcut", "Shannon", "Starrett", "Voelkel"];

async function generateReport() {
    const urlParams = new URLSearchParams(window.location.search);
    const targetCustomer = urlParams.get('name');
    if (!targetCustomer) return;

    // 🚀 Name-ah instant-ah URL-la irundhu eduthu set panroam
    document.getElementById('custHeader').innerText = decodeURIComponent(targetCustomer);
    const tbody = document.getElementById('reportContent');
    
    // Initial loading message
    tbody.innerHTML = "<tr><td colspan='12' style='padding:20px; font-size:18px;'>Generating Accurate Report... ⚡</td></tr>";

    // 📡 FIREBASE REAL-TIME FETCH
    db.ref('vimag/brands').on('value', (snapshot) => {
        const allBrandsData = snapshot.val();
        
        let rowsHtml = ""; // Strings-ah build pantaa blinking irukkaadhu
        let gTotalValue = 0, gAchievedValue = 0, gBalance = 0;
        let serialNo = 1;

        if (allBrandsData) {
            brands.forEach(brand => {
                if (allBrandsData[brand] && allBrandsData[brand][targetCustomer]) {
                    const customerData = Object.values(allBrandsData[brand][targetCustomer]);
                    
                    customerData.forEach(item => {
                        // 🛡️ ACCURACY FILTER: 
                        // Article No illadha Dummy/Identity rows-ah full-ah skip panroam
                        if (!item.artNo || item.id === "_id_lock" || item.id.startsWith("CUST-") || item.artNo === "SYSTEM") {
                            return; 
                        }

                        let price = parseFloat(item.price || 0);
                        let qtyMo = parseInt(item.qty || 0);
                        let monthQty = parseInt(item.monthQty || 0);
                        let currency = item.currency || "€";
                        
                        let totalValue = qtyMo * price;
                        let achievedValue = monthQty * price;
                        let balance = totalValue - achievedValue;

                        gTotalValue += totalValue;
                        gAchievedValue += achievedValue;
                        gBalance += balance;

                        rowsHtml += `<tr>
                            <td>${serialNo++}</td>
                            <td style="font-weight:bold; color:#c2185b;">${brand}</td>
                            <td>${item.artNo || '-'}</td>
                            <td style="text-align:left;"><strong>${item.name || '-'}</strong></td>
                            <td>${currency}${price.toFixed(2)}</td>
                            <td>${qtyMo}</td>
                            <td>${monthQty}</td>
                            <td class="total-val">${currency}${totalValue.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                            <td class="achieved-text">${currency}${achievedValue.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                            <td class="balance-text">${currency}${balance.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                            <td>${item.handledBy || '-'}</td>
                            <td style="font-size: 14px;">${item.remarks || '-'}</td>
                        </tr>`;
                    });
                }
            });
        }

        // 🎯 Table update (Blink-free)
        tbody.innerHTML = rowsHtml || "<tr><td colspan='12'>No Product Entries Found for this Customer.</td></tr>";

        // 💰 GRAND TOTALS
        const fmt = (num) => num.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('grandTotalValue').innerText = "€ " + fmt(gTotalValue);
     
   document.getElementById('grandAchievedValue').innerText = "€ " + fmt(gAchievedValue);
        document.getElementById('grandBalance').innerText = "€ " + fmt(gBalance);
        
        console.log("Sales Report ✅");
    });
}window.onload = generateReport;
</script>

</body>
</html>
